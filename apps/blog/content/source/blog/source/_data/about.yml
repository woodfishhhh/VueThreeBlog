poem:
  title: 卜算子·勤
  author: 木鱼
  lines:
    - 志坚勤为本，莫凭苦中鸣。
    - 夜以继日工作辛，汗水洒衣襟。
    - 无病叹呻吟，空自惹人评。
    - 愿得硕果累累日，笑看世间宁。


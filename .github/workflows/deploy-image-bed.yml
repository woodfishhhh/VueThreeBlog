name: Deploy Image Bed

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-image-bed.yml"
      - "apps/image-bed-web/**"
      - "apps/image-bed-api/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".npmrc"
      - "patches/**"
      - "deploy/image-bed/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: image-bed-deploy
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy Web Frontend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm shared:build

      - name: Typecheck image-bed-web
        run: pnpm image-bed:web:typecheck

      - name: Test image-bed-web
        run: pnpm image-bed:web:test

      - name: Build image-bed-web
        run: pnpm image-bed:web:build

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" "mkdir -p /opt/blog-stack/sites/admin/assets"
          rsync -avz --delete \
            apps/image-bed-web/dist/ \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/opt/blog-stack/sites/admin/"

      - name: Upload nginx config
        run: |
          scp \
            -o BatchMode=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            deploy/image-bed/img.woodfish.site.conf \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/img.woodfish.site.conf"

      - name: Activate nginx config
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" <<'EOF'
            set -eu

            container="blog-nginx"
            config_path="/opt/blog-stack/nginx/conf.d/img.woodfish.site.conf"
            config_backup="${config_path}.bak.${{ github.run_id }}"

            test -f /etc/letsencrypt/live/img.woodfish.site/fullchain.pem
            test -f /etc/letsencrypt/live/img.woodfish.site/privkey.pem
            mkdir -p "$(dirname "$config_path")"

            if [ -f "$config_path" ]; then
              cp "$config_path" "$config_backup"
            fi

            rollback() {
              if [ -f "$config_backup" ]; then
                mv "$config_backup" "$config_path"
              else
                rm -f "$config_path"
              fi
              docker exec "$container" nginx -s reload >/dev/null 2>&1 || true
            }

            cat /tmp/img.woodfish.site.conf > "$config_path"
            if ! docker exec "$container" nginx -t; then
              rollback
              exit 1
            fi

            if ! docker exec "$container" nginx -s reload; then
              rollback
              exit 1
            fi

            rm -f "$config_backup" /tmp/img.woodfish.site.conf
          EOF

      - name: Verify deployment
        run: |
          html="$(curl -kfsSL "https://img.woodfish.site/admin/")"
          printf '%s' "$html" | grep -q '<title>Muyu Admin</title>'
          printf '%s' "$html" | grep -q '/admin/assets/'
          echo "Web frontend deployed successfully"

  deploy-api:
    name: Deploy API Service
    runs-on: ubuntu-latest
    needs: deploy-web
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MUYU_API_IMAGE: ghcr.io/woodfishhhh/muyu-image-bed-api:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm shared:build

      - name: Typecheck image-bed-api
        run: pnpm image-bed:api:typecheck

      - name: Build image-bed-api
        run: pnpm image-bed:api:build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/image-bed-api/Dockerfile
          push: true
          tags: |
            ghcr.io/woodfishhhh/muyu-image-bed-api:latest
            ghcr.io/woodfishhhh/muyu-image-bed-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Login VPS to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s\n' "$GHCR_TOKEN" | ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

      - name: Rolling update on VPS
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" <<'EOF'
            set -euo pipefail

            # Pull latest image and restart
            cd /opt/muyu-image-bed || exit 1
            MUYU_API_IMAGE="ghcr.io/woodfishhhh/muyu-image-bed-api:latest" docker compose -f deploy/image-bed/docker-compose.prod.yml pull
            MUYU_API_IMAGE="ghcr.io/woodfishhhh/muyu-image-bed-api:latest" docker compose -f deploy/image-bed/docker-compose.prod.yml up -d

            # Wait for healthcheck
            for i in {1..30}; do
              if curl -fsSL http://127.0.0.1:3000/api/health >/dev/null 2>&1; then
                echo "API health check passed"
                exit 0
              fi
              sleep 2
            done

            echo "API health check failed"
            MUYU_API_IMAGE="ghcr.io/woodfishhhh/muyu-image-bed-api:latest" docker compose -f deploy/image-bed/docker-compose.prod.yml logs --tail=50
            exit 1
          EOF

      - name: Smoke test API
        run: |
          curl -kfsSL "https://img.woodfish.site/api/health"
          echo "API deployed successfully"

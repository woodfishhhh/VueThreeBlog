name: Deploy Image Bed

on:
  push:
    branches:
      - main
    paths:
      - "apps/image-bed-web/**"
      - "apps/image-bed-api/**"
      - "packages/shared/**"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: image-bed-deploy
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy Web Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run shared:build

      - name: Build image-bed-web
        run: npm run image-bed:web:build

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" "mkdir -p /srv/muyu-admin/assets"
          rsync -avz --delete \
            apps/image-bed-web/dist/ \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/srv/muyu-admin/"

      - name: Verify deployment
        run: |
          curl -fsSL "https://img.woodfish.site/admin/" | grep -q 'lang="zh-CN"'
          echo "Web frontend deployed successfully"

  deploy-api:
    name: Deploy API Service
    runs-on: ubuntu-latest
    needs: deploy-web
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/image-bed-api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/muyu-image-bed-api:latest
            ${{ secrets.DOCKER_USERNAME }}/muyu-image-bed-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rolling update on VPS
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" <<'EOF'
            set -euo pipefail

            # Pull latest image and restart
            cd /opt/muyu-image-bed || exit 1
            docker compose -f deploy/image-bed/docker-compose.prod.yml pull
            docker compose -f deploy/image-bed/docker-compose.prod.yml up -d

            # Wait for healthcheck
            for i in {1..30}; do
              if curl -fsSL http://127.0.0.1:3000/api/health >/dev/null 2>&1; then
                echo "API health check passed"
                exit 0
              fi
              sleep 2
            done

            echo "API health check failed"
            docker compose -f deploy/image-bed/docker-compose.prod.yml logs --tail=50
            exit 1
          EOF

      - name: Smoke test API
        run: |
          curl -fsSL "https://img.woodfish.site/api/health"
          echo "API deployed successfully"

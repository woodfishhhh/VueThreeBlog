name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /newBlog/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Generate content
        run: vp run content:generate

      - name: Agent static checks
        run: vp run -v agent:static

      - name: Agent unit tests
        run: vp run -v agent:test

      - name: Agent dist build
        run: vp run -v agent:dist

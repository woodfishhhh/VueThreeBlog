name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore generated content cache
        id: content-cache
        uses: actions/cache@v4
        with:
          path: |
            apps/blog/src/generated
            apps/blog/public/post-index.json
            apps/blog/public/content-assets
            apps/blog/public/imported-assets
            apps/blog/public/remote-assets
          key: content-gen-v1-${{
            hashFiles(
              'package.json',
              'pnpm-workspace.yaml',
              'apps/blog/package.json',
              'apps/blog/content/source/myblog/**',
              'apps/blog/content/posts/**',
              'apps/blog/content/source/blog/source/_data/**',
              'apps/blog/content/source/blog/_config.yml',
              'packages/content-tools/src/**',
              'packages/content-tools/package.json',
              'pnpm-lock.yaml'
            )
          }}

      - name: Generate content
        if: steps.content-cache.outputs.cache-hit != 'true'
        run: pnpm generate:content:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Dist build
        run: pnpm -F @woodfish-nest/blog build:deploy:dist

      - name: Upload blog dist artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: blog-dist
          path: apps/blog/dist
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

name: Deploy to VPS

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: vue-three-blog-vps
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VITE_BASE_PATH: /newBlog/
      DEPLOY_URL: https://woodfish.site/newBlog/
      DEPLOY_ARCHIVE: vue-three-blog-${{ github.run_id }}.tar.gz
      DEPLOY_REMOTE_ARCHIVE: /tmp/vue-three-blog-${{ github.run_id }}.tar.gz
      DEPLOY_REMOTE_CHUNKS: /tmp/vue-three-blog-${{ github.run_id }}-chunks
      DEPLOY_DIR: ${{ secrets.DEPLOY_DIR || '/opt/blog-stack/sites/newBlog' }}
      DEPLOY_CONTAINER: blog-nginx

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Download blog dist artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: blog-dist
          path: apps/blog/dist
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        if: github.event_name == 'workflow_dispatch'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch'
        run: pnpm install --frozen-lockfile

      - name: Generate content
        if: github.event_name == 'workflow_dispatch'
        run: pnpm generate:content:ci

      - name: Typecheck
        if: github.event_name == 'workflow_dispatch'
        run: pnpm typecheck

      - name: Dist build
        if: github.event_name == 'workflow_dispatch'
        run: pnpm -F @woodfish-nest/blog build:deploy:dist

      - name: Verify dist artifact
        run: |
          test -f apps/blog/dist/index.html
          test -f apps/blog/dist/sw.js
          test -f apps/blog/dist/manifest.webmanifest
          test -d apps/blog/dist/assets

      - name: Package site archive
        run: |
          tar -czf "${{ env.DEPLOY_ARCHIVE }}" -C apps/blog/dist .
          sha256sum "${{ env.DEPLOY_ARCHIVE }}" > "${{ env.DEPLOY_ARCHIVE }}.sha256"
          split -b 1m -d -a 4 "${{ env.DEPLOY_ARCHIVE }}" "${{ env.DEPLOY_ARCHIVE }}.part-"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload site archive chunks
        run: |
          ssh_dest="${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}"
          remote_chunks="${{ env.DEPLOY_REMOTE_CHUNKS }}"
          remote_archive="${{ env.DEPLOY_REMOTE_ARCHIVE }}"

          # shellcheck disable=SC2029
          ssh "$ssh_dest" "rm -rf '$remote_chunks'; mkdir -p '$remote_chunks'; rm -f '$remote_archive'"

          for part in "${{ env.DEPLOY_ARCHIVE }}".part-*; do
            uploaded=0
            for attempt in 1 2 3; do
              if timeout 180s scp \
                -o BatchMode=yes \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=4 \
                "$part" \
                "$ssh_dest:$remote_chunks/$(basename "$part")"; then
                uploaded=1
                break
              fi

              if [ "$attempt" -lt 3 ]; then
                sleep 5
              fi
            done

            test "$uploaded" -eq 1
          done

          # shellcheck disable=SC2029
          ssh "$ssh_dest" "cat '$remote_chunks'/${{ env.DEPLOY_ARCHIVE }}.part-* > '$remote_archive'"
          local_sha="$(cut -d ' ' -f1 "${{ env.DEPLOY_ARCHIVE }}.sha256")"
          # shellcheck disable=SC2029
          remote_sha="$(ssh "$ssh_dest" "sha256sum '$remote_archive' | cut -d ' ' -f1")"
          test "$local_sha" = "$remote_sha"

          # shellcheck disable=SC2029
          ssh "$ssh_dest" "rm -rf '$remote_chunks'"

      - name: Verify remote archive
        run: |
          ssh_dest="${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}"
          remote_archive="${{ env.DEPLOY_REMOTE_ARCHIVE }}"
          remote_next="${{ env.DEPLOY_DIR }}.next.${{ github.run_id }}"

          # shellcheck disable=SC2029
          ssh "$ssh_dest" "case '$remote_next' in /opt/blog-stack/sites/*.next.*) ;; *) echo 'Refusing unsafe staging dir: $remote_next' >&2; exit 2 ;; esac; rm -rf '$remote_next'; mkdir -p '$remote_next'; tar -xzf '$remote_archive' -C '$remote_next'"
          # shellcheck disable=SC2029
          ssh "$ssh_dest" "test -f '$remote_next/index.html' && test -d '$remote_next/assets'"

      - name: Upload nginx config
        run: |
          timeout 60s scp \
            -o BatchMode=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            deploy/nginx.conf \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/default.conf"

      - name: Activate release
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" <<EOF
          set -eu

          archive="${{ env.DEPLOY_REMOTE_ARCHIVE }}"
          target_dir="${{ env.DEPLOY_DIR }}"
          base_path="${{ env.VITE_BASE_PATH }}"
          container="${{ env.DEPLOY_CONTAINER }}"
          config_path="/opt/blog-stack/nginx/conf.d/default.conf"
          config_backup="\${config_path}.bak.${{ github.run_id }}"
          next_dir="\${target_dir}.next.${{ github.run_id }}"
          backup_dir="\${target_dir}.bak.${{ github.run_id }}"

          rollback() {
            rm -rf "\$next_dir"
            rm -rf "\$target_dir"
            if [ -d "\$backup_dir" ]; then
              mv "\$backup_dir" "\$target_dir"
            fi
            if [ -f "\$config_backup" ]; then
              cat "\$config_backup" > "\$config_path"
              rm -f "\$config_backup"
            fi
            docker exec "\$container" nginx -s reload >/dev/null 2>&1 || true
          }

          case "\$target_dir" in
            /opt/blog-stack/sites/*) ;;
            *) echo "Refusing unsafe deploy dir: \$target_dir" >&2; exit 2 ;;
          esac

          cp "\$config_path" "\$config_backup"
          cat /tmp/default.conf > "\$config_path"
          if ! docker exec "\$container" nginx -t; then
            cat "\$config_backup" > "\$config_path"
            rm -f "\$config_backup"
            docker exec "\$container" nginx -s reload || true
            exit 1
          fi

          rm -rf "\$backup_dir"

          test -f "\$next_dir/index.html"
          test -f "\$next_dir/sw.js"
          test -f "\$next_dir/manifest.webmanifest"
          test -d "\$next_dir/assets"
          grep -q "\${base_path}assets/" "\$next_dir/index.html"
          if grep -q '"/assets/' "\$next_dir/index.html"; then
            echo "index.html contains root-scoped /assets refs" >&2
            exit 3
          fi

          if [ -d "\$target_dir" ]; then
            mv "\$target_dir" "\$backup_dir"
          fi

          mv "\$next_dir" "\$target_dir"
          chmod -R a+rX "\$target_dir"

          if ! docker exec "\$container" nginx -s reload; then
            rollback
            exit 1
          fi

          if ! docker exec "\$container" sh -c "test -f /usr/share/nginx/html\${base_path}index.html && grep -q '\${base_path}assets/' /usr/share/nginx/html\${base_path}index.html"; then
            rollback
            exit 1
          fi

          rm -f "\$archive"
          rm -rf "\$backup_dir"
          rm -f "\$config_backup"
          rm -f /tmp/default.conf
          EOF

      - name: Smoke test live site
        run: |
          html="$(curl -kfsSL "${{ env.DEPLOY_URL }}")"
          printf '%s' "$html" | grep -q "${{ env.VITE_BASE_PATH }}assets/"
          if printf '%s' "$html" | grep -q '"/assets/'; then
            echo "Live HTML still contains root-scoped /assets refs" >&2
            exit 1
          fi

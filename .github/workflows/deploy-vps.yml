name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vue-three-blog-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /newBlog/
      DEPLOY_ARCHIVE: vue-three-blog-${{ github.run_id }}.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Package site archive
        run: tar -czf "${{ env.DEPLOY_ARCHIVE }}" -C dist .

      - name: Upload site archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ${{ env.DEPLOY_ARCHIVE }}
          target: /tmp

      - name: Activate release
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu

            archive="/tmp/${{ env.DEPLOY_ARCHIVE }}"
            target_dir="${{ secrets.DEPLOY_DIR }}"
            next_dir="${target_dir}.next"
            backup_dir="${target_dir}.bak"

            rm -rf "$next_dir" "$backup_dir"
            mkdir -p "$next_dir"
            tar -xzf "$archive" -C "$next_dir"

            if [ -d "$target_dir" ]; then
              mv "$target_dir" "$backup_dir"
            fi

            mv "$next_dir" "$target_dir"
            chmod -R 755 "$target_dir"

            rm -f "$archive"
            rm -rf "$backup_dir"

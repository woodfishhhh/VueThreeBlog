name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vue-three-blog-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /newBlog/
      DEPLOY_ARCHIVE: vue-three-blog-${{ github.run_id }}.tar.gz
      DEPLOY_REMOTE_ARCHIVE: /tmp/vue-three-blog-${{ github.run_id }}.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate content
        run: npm run generate:content

      - name: Unit tests
        run: npm run test

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package site archive
        run: tar -czf "${{ env.DEPLOY_ARCHIVE }}" -C dist .

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload site archive
        run: |
          scp "${{ env.DEPLOY_ARCHIVE }}" "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_REMOTE_ARCHIVE }}"

      - name: Upload nginx config
        run: |
          scp deploy/nginx.conf "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/default.conf"

      - name: Activate release
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" <<EOF
          set -eu

          archive="${{ env.DEPLOY_REMOTE_ARCHIVE }}"
          target_dir="${{ secrets.DEPLOY_DIR }}"
          next_dir="\${target_dir}.next"
          backup_dir="\${target_dir}.bak"

          # 同步 nginx 配置并重载
          cp /tmp/default.conf /opt/blog-stack/nginx/conf.d/default.conf
          docker exec blog-nginx nginx -s reload || true

          rm -rf "\$next_dir" "\$backup_dir"
          mkdir -p "\$next_dir"
          tar -xzf "\$archive" -C "\$next_dir"

          if [ -d "\$target_dir" ]; then
            mv "\$target_dir" "\$backup_dir"
          fi

          mv "\$next_dir" "\$target_dir"
          chmod -R 755 "\$target_dir"

          rm -f "\$archive"
          rm -rf "\$backup_dir"
          rm -f /tmp/default.conf
          EOF

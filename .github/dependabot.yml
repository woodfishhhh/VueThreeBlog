# Dependabot 配置
# ================================
# 每周自动扫描 npm + GitHub Actions 依赖更新,生成 PR。
# - 开发依赖打包成单个 PR(减少噪音)
# - 运行时依赖单 PR 单更新(便于评审兼容性影响)
# - GitHub Actions 单 PR 单更新

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(actions)"
      include: "scope"

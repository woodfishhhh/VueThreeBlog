server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────────────────
    # Gzip 压缩配置
    # ─────────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_static on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 4;

    gzip_types text/plain text/css text/xml application/javascript application/json
               application/x-javascript application/xml application/rss+xml
               application/atom+xml image/svg+xml font/ttf font/otf font/eot;

    # ─────────────────────────────────────────────────────────────────────────
    # 静态资源缓存策略
    # ─────────────────────────────────────────────────────────────────────────
    # JS/CSS - 长期缓存（文件名带 hash，变了就新文件）
    location ~* \.(js|css)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 图片 - 中期缓存
    location ~* \.(png|jpg|jpeg|webp|gif|ico|svg)$ {
        gzip_static on;
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # 字体 - 长期缓存
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # .gz 预压缩文件
    location ~* \.gz$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Content-Encoding gzip;
        add_header Vary Accept-Encoding;
        access_log off;
    }

    # HTML - 不缓存，确保 Service Worker 更新立即生效
    location ~* \.html$ {
        gzip_static on;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
        add_header Expires 0;
    }

    # JSON / manifest - 短期缓存（PWA 和内容索引用）
    location ~* \.(json|webmanifest)$ {
        gzip_static on;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 路由重定向
    # ─────────────────────────────────────────────────────────────────────────
    location = / {
        return 302 /newBlog/;
    }

    location = /newBlog {
        return 301 /newBlog/;
    }

    location /newBlog/ {
        alias /usr/share/nginx/html/newBlog/;
        try_files $uri $uri/ /newBlog/index.html;
    }

    location = /weather {
        return 301 /weather/;
    }

    location /weather/ {
        alias /usr/share/nginx/html/weather/;
        try_files $uri $uri/ /weather/index.html;
    }

    location = /pretext {
        return 301 /pretext/;
    }

    location /pretext/ {
        alias /usr/share/nginx/html/pretext/;
        try_files $uri $uri/ /pretext/index.html;
    }
}

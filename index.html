<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="https://pic1.imgdb.cn/item/682f3d1658cb8da5c807b704.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const KEY = "vuecubeblog-theme";
        const DEFAULT = "night";

        let nextTheme = DEFAULT;
        try {
          const stored = window.localStorage.getItem(KEY);
          if (stored === "night" || stored === "day") nextTheme = stored;
        } catch {}

        const root = document.documentElement;
        root.dataset.theme = nextTheme;
        root.style.colorScheme = nextTheme === "day" ? "light" : "dark";
      })();
    </script>

    <!--
      性能优化：内联关键 CSS
      ================================
      几行最基础的样式内联到 <head>，在 JS 加载之前就能渲染：
      - 背景色 (#050510 深空黑)
      - 文字颜色 (白色)
      - 防止闪屏 (FOUC - Flash of Unstyled Content)

      完整 CSS 仍然由 Vite 加载（异步，不阻塞渲染）
    -->
    <style>
      :root {
        --stage-bg: #050510;
        --stage-fg: #f6f8ff;
      }

      :root[data-theme="day"] {
        --stage-bg: #fafaf7;
        --stage-fg: #17191f;
      }

      /* 关键 CSS：防止页面加载时闪烁 */
      body { background-color: var(--stage-bg); color: var(--stage-fg); margin: 0; }
      #app { min-height: 100vh; }
    </style>

    <!-- SEO & Social Meta -->
    <meta
      name="description"
      content="WOODFISH | Vue-powered immersive 3D blog experience." />
    <meta name="theme-color" content="#050510" />
    <link rel="canonical" href="https://woodfish.site/newBlog/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WOODFISH | VueCubeBlog" />
    <meta
      property="og:description"
      content="WOODFISH | Vue-powered immersive 3D blog experience." />
    <meta property="og:url" content="https://woodfish.site/newBlog/" />
    <meta property="og:image" content="https://woodfish.site/newBlog/favicon.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WOODFISH | VueCubeBlog" />
    <meta
      name="twitter:description"
      content="WOODFISH | Vue-powered immersive 3D blog experience." />
    <meta name="twitter:image" content="https://woodfish.site/newBlog/favicon.svg" />

    <!--
      Content Security Policy (CSP)
      ==============================
      CSP 是浏览器安全的第一道防线。它告诉浏览器：
      - script-src: 只允许从 'self'（同源）和内联脚本加载 JS
      - style-src: 只允许同源和内联样式
      - font-src: 只允许同源字体
      - img-src: 只允许同源图片、data/blob URL、以及 favicon 图床资源
      - connect-src: 只允许同源请求
      - frame-ancestors: 只能通过 HTTP 响应头配置，不能放在 meta CSP 中

      为什么禁止 'unsafe-inline'？
      -----------------------------
      如果允许内联脚本（unsafe-inline），攻击者通过 XSS 注入的 <script> 标签就能执行。
      但 Three.js 和 Vue 的构建产物本身是安全的内联脚本，所以 'unsafe-inline' + 'unsafe-eval'
      只能作为 fallback。注意：这是静态博客，风险可控。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        font-src 'self';
        img-src 'self' data: blob: https://pic1.imgdb.cn https://*.superbed.cc;
        connect-src 'self';
        base-uri 'self';
        form-action 'self' https://github.com;
      " />

    <title>WOODFISH | VueCubeBlog</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
